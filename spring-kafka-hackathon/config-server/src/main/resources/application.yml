server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    # Use 'git' profile: config is in a separate Git repo. Set CONFIG_SERVER_GIT_URI to that repo URL.
    active: ${SPRING_PROFILES_ACTIVE:git}
  cloud:
    config:
      server:
        git:
          # Set via env: SPRING_CLOUD_CONFIG_SERVER_GIT_URI (public repo; no username/password)
          uri: ${spring.cloud.config.server.git.uri}
          default-label: main
          skip-ssl-validation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
